# LiteLLM proxy configuration for the gateway.
#
# Run from the gateway/ directory so the callback module resolves:
#   litellm --config config.yaml
#
# API keys are taken from the environment (e.g. ANTHROPIC_API_KEY).

model_list:
  - model_name: lead
    litellm_params:
      model: anthropic/claude-fable-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Test-traffic alias: generates sample Lead-tier telemetry for Shadow
  # Evaluation without touching the production "lead" alias (D-0028).
  - model_name: lead-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Frontier-ish baseline at $0 for Shadow Evaluation, until a paid
  # ANTHROPIC_API_KEY is available (D-0028; CURRENT_CONTEXT.md).
  - model_name: lead-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # Middle tier (ARCHITECTURE.md hierarchy: routine coding) via Groq
  # free tier. Exists so "Routine code generation -> Middle" in
  # DELEGATION_TABLE.md can be tested against the tier it names.
  - model_name: middle-groq
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # Shadow Evaluation judge (shadow_eval.py --judge-model). gpt-oss-120b
  # reasoning model via Groq free tier: 11/11 on judge_calibration.json
  # where middle-groq stuck at 10/11 (mis-traces correct code). Named by
  # role, not tier: judging is supervision, its cost must be separable
  # in the Ledger (ARCHITECTURE.md Rule #1).
  - model_name: judge-groq
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY

  # Builder-binding candidate on the API contour (operator direction
  # 2026-07-09, after the t-010 pilot): same free key, stronger model
  # than middle-groq for text-shaped implementation — its judge twin
  # passed 13/13 calibration incl. the code-tracing pair the 70B
  # failed. Named by FUNCTION (D-0062); separate from judge-groq so
  # work spend and supervision spend stay separable (D-0031, Rule #1).
  # Caveat: same underlying model as the judge — Shadow Evaluation
  # over this binding is SELF-JUDGING; use chief-judge/manual review
  # for its pairs.
  - model_name: builder-groq
    litellm_params:
      model: groq/openai/gpt-oss-120b
      api_key: os.environ/GROQ_API_KEY

  # Intern: local worker (ARCHITECTURE.md hierarchy), free to run.
  # Synthetic per-token prices exercise the Guard/Ledger money paths
  # (roughly Haiku-class pricing) without real spend.
  - model_name: intern
    litellm_params:
      # ollama_chat/ = native /api/chat: passes TOOLS through (t-011:
      # with legacy ollama/ the model wrote tool calls as text inside
      # reasoning_content and agents saw empty answers). analyst stays
      # on ollama/ - it never tool-calls.
      model: ollama_chat/qwen3:4b
      api_base: http://localhost:11434
      input_cost_per_token: 0.0000001
      output_cost_per_token: 0.0000004

  # Analyst: same local model under its own alias so the Ledger
  # accounts supervision cost separately (ARCHITECTURE.md Rule #1).
  - model_name: analyst
    litellm_params:
      model: ollama/qwen3:4b
      api_base: http://localhost:11434
      input_cost_per_token: 0.0000001
      output_cost_per_token: 0.0000004

  # Smoke-test model: never calls a provider, needs no API key.
  - model_name: mock
    litellm_params:
      model: anthropic/claude-fable-5
      mock_response: pong

litellm_settings:
  callbacks: [sqlite_logger.logger_instance, guard.guard_instance]
